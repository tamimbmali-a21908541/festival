{% extends 'festival/layout.html' %}

{% block content %}
    
    <article class="card">
        <h2>{{ concerto.banda.nome }}</h2>
        <p><strong>Dia:</strong> {{ concerto.dia }}</p>
        <p><strong>Hora:</strong> {{ concerto.hora }}</p>
        <p><strong>Palco:</strong> {{ concerto.palco }}</p>
    </article>

    
{% endblock %}
